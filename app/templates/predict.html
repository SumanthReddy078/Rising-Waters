{% extends "base.html" %}

{% block content %}

<section class="py-5">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-10">

                <div class="card shadow border-0">

                    <div class="card-header bg-primary text-white text-center py-4">

                        <h2 class="mb-2">

                            <i class="fa-solid fa-cloud-showers-water me-2"></i>

                            Flood Prediction

                        </h2>

                        <p class="mb-0">

                            Enter the weather parameters below to predict flood risk.

                        </p>

                    </div>
                    <div class="alert alert-info mt-3">

                        <strong>Note:</strong>

                        Enter weather values in the same units as the training dataset.

                    </div>
                    <div class="card-body p-4">

                        <form action="{{ url_for('predict_result') }}"
                              method="POST"
                              id="predictionForm">

                            <div class="row">

                                <!-- Temperature -->
                                <div class="col-md-6 mb-4">

                                    <label class="form-label">

                                        Temperature (°C)

                                    </label>

                                    <input type="number"
                                           class="form-control"
                                           name="temp"
                                           placeholder="Example: 29"
                                           step="0.1"
                                           required>

                                </div>

                                <!-- Humidity -->
                                <div class="col-md-6 mb-4">

                                    <label class="form-label">

                                        Humidity (%)

                                    </label>

                                    <input type="number"
                                           class="form-control"
                                           name="humidity"
                                           placeholder="Example: 70"
                                           step="0.1"
                                           required>

                                </div>

                                <!-- Cloud Cover -->
                                <div class="col-md-6 mb-4">

                                    <label class="form-label">

                                        Cloud Cover (%)

                                    </label>

                                    <input type="number"
                                           class="form-control"
                                           name="cloud_cover"
                                           placeholder="Example: 30"
                                           step="0.1"
                                           required>

                                </div>

                                <!-- Annual Rainfall -->
                                <div class="col-md-6 mb-4">

                                    <label class="form-label">

                                        Annual Rainfall (mm)

                                    </label>

                                    <input type="number"
                                           class="form-control"
                                           name="annual"
                                           placeholder="Example: 3248.6"
                                           step="0.1"
                                           required>

                                </div>

                                <!-- Jan-Feb -->
                                <div class="col-md-6 mb-4">

                                    <label class="form-label">

                                        Jan-Feb Rainfall (mm)

                                    </label>

                                    <input type="number"
                                           class="form-control"
                                           name="jan_feb"
                                           placeholder="Example: 73.4"
                                           step="0.1"
                                           required>

                                </div>

                                <!-- Mar-May -->
                                <div class="col-md-6 mb-4">

                                    <label class="form-label">

                                        Mar-May Rainfall (mm)

                                    </label>

                                    <input type="number"
                                           class="form-control"
                                           name="mar_may"
                                           placeholder="Example: 386.2"
                                           step="0.1"
                                           required>

                                </div>

                                <!-- Jun-Sep -->
                                <div class="col-md-6 mb-4">

                                    <label class="form-label">

                                        Jun-Sep Rainfall (mm)

                                    </label>

                                    <input type="number"
                                           class="form-control"
                                           name="jun_sep"
                                           placeholder="Example: 2122.8"
                                           step="0.1"
                                           required>

                                </div>

                                <!-- Oct-Dec -->
                                <div class="col-md-6 mb-4">

                                    <label class="form-label">

                                        Oct-Dec Rainfall (mm)

                                    </label>

                                    <input type="number"
                                           class="form-control"
                                           name="oct_dec"
                                           placeholder="Example: 666.1"
                                           step="0.1"
                                           required>

                                </div>

                                <!-- Average June -->
                                <div class="col-md-6 mb-4">

                                    <label class="form-label">

                                        Average June Rainfall (mm)

                                    </label>

                                    <input type="number"
                                           class="form-control"
                                           name="avgjune"
                                           placeholder="Example: 274.8"
                                           step="0.1"
                                           required>

                                </div>

                                <!-- Subdivision -->
                                <div class="col-md-6 mb-4">

                                    <label class="form-label">

                                        Subdivision Rainfall (mm)

                                    </label>

                                    <input type="number"
                                           class="form-control"
                                           name="sub"
                                           placeholder="Example: 649.9"
                                           step="0.1"
                                           required>

                                </div>

                            </div>

                            <div class="d-flex justify-content-center gap-3 mt-4">

                                <a href="{{ url_for('home') }}"
                                class="btn btn-outline-secondary btn-lg">

                                    <i class="fa-solid fa-house me-2"></i>

                                    Home

                                </a>

                                <button type="submit"
                                        class="btn btn-primary btn-lg px-5">

                                    <i class="fa-solid fa-water me-2"></i>

                                    Predict Flood Risk

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
