{% extends "base.html" %}

{% block content %}

<section class="py-5">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card shadow border-0">

                    <!-- Card Header -->

                    <div class="card-header text-center bg-{{ alert_class }} text-white py-4">

                        <h2>

                            {{ heading }}

                        </h2>

                    </div>

                    <!-- Card Body -->

                    <div class="card-body p-5">

                        <!-- Prediction Message -->

                        <div class="text-center mb-4">

                            {% if prediction == 1 %}

                                <i class="fa-solid fa-triangle-exclamation fa-5x text-danger mb-3"></i>

                            {% else %}

                                <i class="fa-solid fa-circle-check fa-5x text-success mb-3"></i>

                            {% endif %}

                            <h4 class="fw-bold">

                                {{ title }}

                            </h4>

                            <p class="lead text-muted">

                                {{ message }}

                            </p>

                        </div>

                        <hr>

                        <!-- Recommendations -->

                        <h5 class="mb-3">

                            <i class="fa-solid fa-list-check me-2"></i>

                            Recommendations

                        </h5>

                        <ul class="list-group list-group-flush mb-4">

                            {% for item in recommendation %}

                            <li class="list-group-item">

                                <i class="fa-solid fa-check text-success me-2"></i>

                                {{ item }}

                            </li>

                            {% endfor %}

                        </ul>

                        <!-- Buttons -->

                        <div class="text-center">

                            <a href="{{ url_for('predict_page') }}"
                               class="btn btn-primary me-3">

                                <i class="fa-solid fa-rotate-right me-2"></i>

                                Predict Again

                            </a>

                            <a href="{{ url_for('home') }}"
                               class="btn btn-outline-secondary">

                                <i class="fa-solid fa-house me-2"></i>

                                Home

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
